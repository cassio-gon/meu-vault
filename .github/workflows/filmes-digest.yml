name: Digest de Filmes e Séries

on:
  schedule:
    - cron: "37 5 * * *"  # 05:37 UTC / 02:37 BRT
  workflow_dispatch:
    inputs:
      topics:
        description: "Quantidade de tópicos"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do vault
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r .automation/requirements.txt

      - name: Gerar digest e commitar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAULT_PATH: ${{ github.workspace }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "vault-bot"
          git config user.email "actions@users.noreply.github.com"
          python .automation/main.py digest \
            --area Filmes --tag filmes-series --folder "Pesquisas/Filmes e Series" \
            --topics "${{ github.event.inputs.topics || '5' }}"
