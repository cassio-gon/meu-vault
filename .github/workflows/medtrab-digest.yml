name: Digest de Medicina do Trabalho

on:
  schedule:
    # 12:00 UTC = 09:00 no horário de Brasília (UTC-3).
    # Defasado do digest de Saúde (08:30) para não colidir no push.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      topics:
        description: "Quantidade de tópicos"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do vault
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r .automation/requirements.txt

      - name: Gerar digest e commitar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAULT_PATH: ${{ github.workspace }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "vault-bot"
          git config user.email "actions@users.noreply.github.com"
          python .automation/main.py digest \
            --area MedTrab --tag medtrab --folder "Pesquisas/Medicina do Trabalho" \
            --topics "${{ github.event.inputs.topics || '10' }}"

      - name: Notificar via ntfy
        if: success()
        run: |
          NOTE=$(git show --pretty="" --name-only --diff-filter=A HEAD | grep -E '^Pesquisas/Medicina do Trabalho/.*\.md$' | head -1 || true)
          if [ -n "$NOTE" ] && [ -f "$NOTE" ]; then
            BODY=$(head -c 1500 "$NOTE")
          else
            BODY="Digest de Medicina do Trabalho do dia gerado no vault."
          fi
          curl -s \
            -H "Title: Digest Med. Trabalho pronto" \
            -H "Tags: stethoscope,robot" \
            -d "$BODY" \
            "https://ntfy.sh/cassio-vault-101dd452"
