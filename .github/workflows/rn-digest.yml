name: Digest Recém-Nascidos

on:
  # DESATIVADO 2026-06-30 — agendamento migrado para Routine do Claude Cloud.
  # Mantido como fallback manual via "Run workflow" (workflow_dispatch).
  # schedule:
  #   - cron: "42 5 * * *"  # 05:42 UTC / 02:42 BRT
  workflow_dispatch:
    inputs:
      topics:
        description: "Quantidade de tópicos"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do vault
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r .automation/requirements.txt

      - name: Gerar digest e commitar
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAULT_PATH: ${{ github.workspace }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "vault-bot"
          git config user.email "actions@users.noreply.github.com"
          python .automation/main.py digest \
            --area RN --tag recem-nascidos --folder "Pesquisas/RN" \
            --topics "${{ github.event.inputs.topics || '5' }}"
