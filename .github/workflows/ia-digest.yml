name: Digest de IA

on:
  schedule:
    # 11:00 UTC = 08:00 no horário de Brasília (UTC-3).
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      topics:
        description: "Quantidade de tópicos"
        required: false
        default: "6"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do vault
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r .automation/requirements.txt

      - name: Gerar digest e commitar
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAULT_PATH: ${{ github.workspace }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "vault-bot"
          git config user.email "actions@users.noreply.github.com"
          python .automation/main.py digest \
            --area IA --tag ia --folder "Pesquisas/IA" \
            --topics "${{ github.event.inputs.topics || '6' }}"
