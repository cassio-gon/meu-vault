name: Digest Puerpério

on:
  workflow_dispatch:
    inputs:
      topics:
        description: "Quantidade de tópicos"
        required: false
        default: "10"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do vault
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r .automation/requirements.txt

      - name: Gerar digest e commitar
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAULT_PATH: ${{ github.workspace }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "vault-bot"
          git config user.email "actions@users.noreply.github.com"
          python .automation/main.py digest \
            --area Puerperio --tag puerperio --folder "Pesquisas/Puerperio" \
            --topics "${{ github.event.inputs.topics || '10' }}"

      - name: Notificar via ntfy
        if: success()
        run: |
          NOTE=$(git show --pretty="" --name-only --diff-filter=A HEAD | grep -E '^Pesquisas/Puerperio/.*\.md$' | head -1 || true)
          if [ -n "$NOTE" ] && [ -f "$NOTE" ]; then
            BODY=$(head -c 1500 "$NOTE")
          else
            BODY="Digest de Puerpério do dia gerado no vault."
          fi
          curl -s \
            -H "Title: Digest Puerpério pronto" \
            -H "Tags: pregnant_woman,robot" \
            -d "$BODY" \
            "https://ntfy.sh/cassio-vault-101dd452"
