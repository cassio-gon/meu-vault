<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#060b18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vault Digest" />
  <title>Vault Digest</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg:        rgba(255, 255, 255, 0.07);
      --glass-border:    rgba(255, 255, 255, 0.13);
      --glass-highlight: rgba(255, 255, 255, 0.20);
      --glass-shadow:    rgba(0, 0, 0, 0.50);
      --text:            #f1f5f9;
      --muted:           #94a3b8;
      --radius:          16px;
      --radius-lg:       24px;
      --safe-bottom:     env(safe-area-inset-bottom, 16px);
      --safe-top:        env(safe-area-inset-top, 0px);

      /* cores por categoria */
      --c-saude:    #10b981;
      --c-ia:       #8b5cf6;
      --c-financas: #f59e0b;
      --c-med:      #f97316;
      --c-research: #0ea5e9;
      --c-noticias: #f43f5e;
      --c-rn:       #fb7185;
      --c-puerp:    #c084fc;
      --c-default:  #38bdf8;
    }

    html, body {
      height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background: #0f1117;
    }

    /* ── Glass helper ───────────────────────────────────────────── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow:
        0 8px 32px var(--glass-shadow),
        inset 0 1px 0 var(--glass-highlight);
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: #0f1117;
      padding: calc(var(--safe-top) + 18px) 20px 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .back-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
      color: var(--text);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s;
    }
    .back-btn.visible { display: flex; }
    .back-btn:active  { background: rgba(255,255,255,0.16); }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }
    .breadcrumb-item {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .breadcrumb-item.dim {
      color: var(--muted);
      font-weight: 400;
      font-size: 14px;
    }
    .breadcrumb-sep {
      color: var(--muted);
      font-size: 13px;
      flex-shrink: 0;
    }

    .header-date {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Content ─────────────────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px calc(24px + var(--safe-bottom));
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Home grid ───────────────────────────────────────────────── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cat-card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.07);
      border-top: 3px solid var(--cat-color, var(--c-default));
      border-radius: var(--radius);
      padding: 18px 14px 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      min-height: 148px;
      display: flex;
      flex-direction: column;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .cat-card:active {
      transform: scale(0.96);
      background: #1f2333;
    }

    .cat-icon  {
      font-size: 38px;
      line-height: 1;
      margin-bottom: auto;
      padding-bottom: 12px;
    }
    .cat-name  { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }

    .cat-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .cat-date {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: rgba(255,255,255,0.07);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .cat-arrow { display: none; }

    /* ── Subcategory list ─────────────────────────────────────────── */
    .subcat-list { display: flex; flex-direction: column; gap: 10px; }

    .subcat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 var(--glass-highlight);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s ease;
    }

    /* colored left strip */
    .subcat-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--cat-color, var(--c-default));
      border-radius: 3px 0 0 3px;
    }

    .subcat-card:active { transform: scale(0.98); }

    .subcat-icon {
      font-size: 22px;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .subcat-info { flex: 1; min-width: 0; }
    .subcat-name  { font-size: 15px; font-weight: 600; color: var(--text); }
    .subcat-count { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .subcat-arrow { color: var(--muted); font-size: 18px; }

    /* ── File list ────────────────────────────────────────────────── */
    .file-list { display: flex; flex-direction: column; gap: 10px; }

    .file-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 var(--glass-highlight);
      border-radius: var(--radius);
      padding: 14px 44px 14px 16px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
    }
    .file-card.latest {
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.28);
    }
    .file-card:active { transform: scale(0.98); }

    .file-date {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--cat-color, var(--c-default));
    }
    .latest-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
      background: rgba(74,222,128,0.18);
      color: #4ade80;
      margin-left: 6px;
      letter-spacing: 0.5px;
      vertical-align: middle;
    }
    .file-title  { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 4px; }
    .file-arrow  {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
    }

    /* ── Article ─────────────────────────────────────────────────── */
    .article-wrap {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      line-height: 1.75;
    }
    .article-wrap h1 {
      font-size: 21px; font-weight: 700;
      color: var(--text);
      margin-bottom: 20px; line-height: 1.3;
    }
    .article-wrap h2 {
      font-size: 15px; font-weight: 700;
      color: var(--text);
      margin: 22px 0 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--glass-border);
    }
    .article-wrap h3 {
      font-size: 14px; font-weight: 600;
      color: var(--text);
      margin: 16px 0 6px;
    }
    .article-wrap p  { font-size: 14px; color: #cbd5e1; margin-bottom: 12px; }
    .article-wrap strong { color: var(--text); }
    .article-wrap em     { color: var(--muted); }
    .article-wrap ul, .article-wrap ol { padding-left: 20px; margin-bottom: 12px; }
    .article-wrap li { font-size: 14px; color: #cbd5e1; margin-bottom: 5px; }
    .article-wrap blockquote {
      border-left: 3px solid var(--cat-color, var(--c-default));
      background: rgba(255,255,255,0.04);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      margin: 14px 0;
      color: var(--muted);
    }
    .article-wrap a   { color: var(--cat-color, var(--c-default)); text-decoration: none; }
    .article-wrap hr  { border: none; border-top: 1px solid var(--glass-border); margin: 18px 0; }
    .article-wrap code {
      font-size: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 1px 5px;
    }

    /* ── States ──────────────────────────────────────────────────── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      gap: 12px;
    }
    .state .icon { font-size: 38px; }
    .state .msg  { color: var(--muted); font-size: 14px; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.10);
      border-top-color: rgba(255,255,255,0.55);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header" id="header">
  <div class="header-inner">
    <div class="header-left">
      <button class="back-btn" id="back-btn" onclick="goBack()">‹</button>
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item">Vault Digest</span>
      </div>
    </div>
    <div class="header-date" id="header-date"></div>
  </div>
</div>

<div class="content" id="content">
  <div class="state"><div class="spinner"></div><div class="msg">Carregando...</div></div>
</div>

<script>
  const REPO = 'cassio-gon/meu-vault';
  const BASE = 'Pesquisas';
  const API  = `https://api.github.com/repos/${REPO}/contents`;
  const RAW  = `https://raw.githubusercontent.com/${REPO}/main`;

  // metadados visuais por nome de pasta
  const META = {
    'Saude':                { icon: '🏥', label: 'Saúde',           color: '#10b981' },
    'IA':                   { icon: '🤖', label: 'IA',              color: '#8b5cf6' },
    'Mercado Financeiro':   { icon: '📈', label: 'Finanças',        color: '#f59e0b' },
    'Medicina do Trabalho': { icon: '👷', label: 'Med. Trabalho',   color: '#f97316' },
    'Research':             { icon: '🔬', label: 'Research',        color: '#0ea5e9' },
    'Noticias':             { icon: '📰', label: 'Notícias',        color: '#f43f5e' },
    'Notícias':             { icon: '📰', label: 'Notícias',        color: '#f43f5e' },
    'RN':                   { icon: '👶', label: 'RN',              color: '#fb7185' },
    'Puerperio':            { icon: '🤱', label: 'Puerpério',       color: '#c084fc' },
    'Puerpério':            { icon: '🤱', label: 'Puerpério',       color: '#c084fc' },
    'UTI':                  { icon: '🏨', label: 'UTI',             color: '#f97316' },
    'Cardiologia':          { icon: '❤️', label: 'Cardiologia',     color: '#ef4444' },
    'Pediatria':            { icon: '🧒', label: 'Pediatria',       color: '#38bdf8' },
  };

  function getMeta(name) {
    return META[name] || { icon: '📁', label: name, color: '#38bdf8' };
  }

  // ── navStack: [{type, ...dados}] ─────────────────────────────
  let navStack = [{ type: 'home' }];

  function currentView() { return navStack[navStack.length - 1]; }

  function pushView(view) {
    navStack.push(view);
    render();
  }

  function goBack() {
    if (navStack.length <= 1) return;
    navStack.pop();
    render();
  }

  // ── Header ────────────────────────────────────────────────────
  function updateHeader() {
    const view = currentView();
    const btn  = document.getElementById('back-btn');
    const bc   = document.getElementById('breadcrumb');

    btn.classList.toggle('visible', navStack.length > 1);

    // monta breadcrumb
    const crumbs = [{ label: 'Vault Digest', dim: navStack.length > 1 }];
    if (view.type === 'subcats' || view.type === 'files' || view.type === 'article') {
      const m = getMeta(view.category);
      crumbs.push({ label: m.label, dim: view.type === 'files' && view.subcategory || view.type === 'article' });
    }
    if ((view.type === 'files' && view.subcategory) || (view.type === 'article' && view.subcategory)) {
      crumbs.push({ label: getMeta(view.subcategory).label, dim: false });
    }

    bc.innerHTML = crumbs.map((c, i) => {
      const sep = i < crumbs.length - 1 ? '<span class="breadcrumb-sep">›</span>' : '';
      return `<span class="breadcrumb-item${c.dim ? ' dim' : ''}">${c.label}</span>${sep}`;
    }).join('');
  }

  // ── Render dispatcher ─────────────────────────────────────────
  function render() {
    updateHeader();
    const view = currentView();
    const views = {
      home:    () => renderHome(view),
      subcats: () => renderSubcats(view),
      files:   () => renderFileList(view),
      article: () => renderArticle(view),
    };
    (views[view.type] || (() => {}))();
  }

  // ── Data helpers ──────────────────────────────────────────────
  async function apiFetch(path) {
    const res = await fetch(`${API}/${path}`);
    if (!res.ok) throw new Error(`API ${res.status}`);
    return res.json();
  }

  async function rawFetch(path) {
    const res = await fetch(`${RAW}/${path}`);
    if (!res.ok) throw new Error(`Raw ${res.status}`);
    return res.text();
  }

  // ── Date helpers ──────────────────────────────────────────────
  function todayStr() {
    const d = new Date();
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function extractDate(fname) {
    const m = fname.match(/^(\d{4}-\d{2}-\d{2})/);
    return m ? m[1] : '';
  }

  function formatDate(ds) {
    if (!ds) return '';
    const [, mo, d] = ds.split('-');
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return `${parseInt(d)} ${months[parseInt(mo)-1]}`;
  }

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    document.getElementById('header-date').textContent = todayStr();
    showLoading();
    try {
      const items = await apiFetch(BASE);
      const cats  = items.filter(i => i.type === 'dir').map(i => i.name).sort();
      navStack[0].categories = cats;
      render();
    } catch {
      showError('Não foi possível carregar as categorias.');
    }
  }

  // ── Home ──────────────────────────────────────────────────────
  function renderHome(view) {
    const { categories = [] } = view;
    if (!categories.length) { showEmpty('Nenhuma categoria encontrada.'); return; }

    const el = document.createElement('div');
    el.innerHTML = `<div class="section-label">Categorias</div>`;

    const grid = document.createElement('div');
    grid.className = 'cat-grid';

    categories.forEach(cat => {
      const m    = getMeta(cat);
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.style.setProperty('--cat-color', m.color);
      card.innerHTML = `
        <div class="cat-icon">${m.icon}</div>
        <div class="cat-name">${m.label}</div>
        <div class="cat-footer">
          <span class="cat-date" id="cdate-${cat}">—</span>
          <span class="cat-arrow">›</span>
        </div>`;
      card.onclick = () => selectCategory(cat);
      grid.appendChild(card);

      // carrega data do digest mais recente em background
      loadLatestDate(cat).then(d => {
        const span = document.getElementById(`cdate-${cat}`);
        if (span) span.textContent = d || '—';
      });
    });

    el.appendChild(grid);
    setContent(el);
  }

  async function loadLatestDate(cat) {
    try {
      const items = await apiFetch(`${BASE}/${encodeURIComponent(cat)}`);
      const mds   = items.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));
      if (mds.length) {
        mds.sort((a, b) => b.name.localeCompare(a.name));
        return formatDate(extractDate(mds[0].name));
      }
      // tem subpastas — pega a primeira
      const dirs = items.filter(i => i.type === 'dir');
      if (dirs.length) {
        const sub = await apiFetch(`${BASE}/${encodeURIComponent(cat)}/${encodeURIComponent(dirs[0].name)}`);
        const sf  = sub.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));
        sf.sort((a, b) => b.name.localeCompare(a.name));
        return sf.length ? formatDate(extractDate(sf[0].name)) : null;
      }
    } catch {}
    return null;
  }

  // ── Seleção de categoria ──────────────────────────────────────
  async function selectCategory(cat) {
    showLoading();
    try {
      const items = await apiFetch(`${BASE}/${encodeURIComponent(cat)}`);
      const dirs  = items.filter(i => i.type === 'dir');
      const mds   = items.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));

      if (dirs.length > 0 && mds.length === 0) {
        // pasta-mãe com subcategorias (ex: Notícias → RN, Puerpério)
        pushView({ type: 'subcats', category: cat, subcats: dirs.map(d => d.name) });
      } else {
        const files = mds.sort((a, b) => b.name.localeCompare(a.name)).map(f => ({ name: f.name, path: f.path }));
        pushView({ type: 'files', category: cat, subcategory: null, files });
      }
    } catch {
      showError('Erro ao carregar categoria.');
    }
  }

  // ── Subcategorias ─────────────────────────────────────────────
  function renderSubcats(view) {
    const { category, subcats } = view;
    const pm = getMeta(category);

    const el = document.createElement('div');
    el.innerHTML = `<div class="section-label">${pm.label}</div>`;

    const list = document.createElement('div');
    list.className = 'subcat-list';

    subcats.forEach(sub => {
      const sm   = getMeta(sub);
      const card = document.createElement('div');
      card.className = 'subcat-card';
      card.style.setProperty('--cat-color', sm.color || pm.color);
      card.innerHTML = `
        <div class="subcat-icon">${sm.icon}</div>
        <div class="subcat-info">
          <div class="subcat-name">${sm.label}</div>
          <div class="subcat-count" id="sc-${sub}">carregando...</div>
        </div>
        <div class="subcat-arrow">›</div>`;
      card.onclick = () => selectSubcategory(category, sub);
      list.appendChild(card);

      apiFetch(`${BASE}/${encodeURIComponent(category)}/${encodeURIComponent(sub)}`)
        .then(items => {
          const n   = items.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_')).length;
          const mds = items.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));
          mds.sort((a, b) => b.name.localeCompare(a.name));
          const latest = mds.length ? ` · ${formatDate(extractDate(mds[0].name))}` : '';
          const span   = document.getElementById(`sc-${sub}`);
          if (span) span.textContent = `${n} digest${n !== 1 ? 's' : ''}${latest}`;
        })
        .catch(() => {
          const span = document.getElementById(`sc-${sub}`);
          if (span) span.textContent = '';
        });
    });

    el.appendChild(list);
    setContent(el);
  }

  async function selectSubcategory(cat, sub) {
    showLoading();
    try {
      const items = await apiFetch(`${BASE}/${encodeURIComponent(cat)}/${encodeURIComponent(sub)}`);
      const files = items
        .filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'))
        .sort((a, b) => b.name.localeCompare(a.name))
        .map(f => ({ name: f.name, path: f.path }));
      pushView({ type: 'files', category: cat, subcategory: sub, files });
    } catch {
      showError('Erro ao carregar subcategoria.');
    }
  }

  // ── Lista de arquivos ─────────────────────────────────────────
  function renderFileList(view) {
    const { category, subcategory, files } = view;
    const m = getMeta(subcategory || category);

    if (!files.length) { showEmpty('Nenhum digest encontrado.'); return; }

    const el = document.createElement('div');
    el.innerHTML = `<div class="section-label">${m.label}</div>`;

    const list = document.createElement('div');
    list.className = 'file-list';

    files.forEach((file, idx) => {
      const date = extractDate(file.name);
      const card = document.createElement('div');
      card.className = 'file-card' + (idx === 0 ? ' latest' : '');
      card.style.setProperty('--cat-color', m.color);
      card.innerHTML = `
        <div class="file-date">${formatDate(date)}${idx === 0 ? '<span class="latest-badge">NOVO</span>' : ''}</div>
        <div class="file-title">${m.label} Digest</div>
        <div class="file-arrow">›</div>`;
      card.onclick = () => openArticle(file, category, subcategory);
      list.appendChild(card);
    });

    el.appendChild(list);
    setContent(el);
  }

  // ── Artigo ────────────────────────────────────────────────────
  async function openArticle(file, category, subcategory) {
    showLoading();
    try {
      const md   = await rawFetch(file.path);
      const html = marked.parse(md);
      pushView({ type: 'article', file, category, subcategory, html });
    } catch {
      showError('Erro ao carregar o artigo.');
    }
  }

  function renderArticle(view) {
    const { html, category, subcategory } = view;
    const m   = getMeta(subcategory || category);
    const el  = document.createElement('div');
    el.className = 'article-wrap';
    el.style.setProperty('--cat-color', m.color);
    el.innerHTML = html;
    setContent(el);
  }

  // ── Estados ───────────────────────────────────────────────────
  function setContent(el) {
    const c = document.getElementById('content');
    c.innerHTML = '';
    c.appendChild(el);
    c.scrollTop = 0;
  }

  function showLoading() {
    document.getElementById('content').innerHTML =
      `<div class="state"><div class="spinner"></div><div class="msg">Carregando...</div></div>`;
  }

  function showEmpty(msg) {
    document.getElementById('content').innerHTML =
      `<div class="state"><div class="icon">📭</div><div class="msg">${msg}</div></div>`;
  }

  function showError(msg) {
    document.getElementById('content').innerHTML =
      `<div class="state"><div class="icon">⚠️</div><div class="msg">${msg}</div></div>`;
  }

  // ── Gesto voltar (mobile) ─────────────────────────────────────
  window.addEventListener('popstate', () => {
    if (navStack.length > 1) goBack();
  });

  // ── PWA manifest ──────────────────────────────────────────────
  (() => {
    const manifest = {
      name: 'Vault Digest', short_name: 'Vault',
      start_url: '.', display: 'standalone',
      background_color: '#060b18', theme_color: '#060b18',
      icons: [{ src: 'https://fakeimg.pl/192x192/060b18/f1f5f9?text=V&font_size=80', sizes: '192x192', type: 'image/png' }]
    };
    const link = document.createElement('link');
    link.rel   = 'manifest';
    link.href  = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
    document.head.appendChild(link);
  })();

  init();
</script>

</body>
</html>
