<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Vault Digest" />
  <title>Vault Digest</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg:      #ffffff;
      --surface: #ffffff;
      --fg:      #0f172a;
      --muted:   #94a3b8;
      --border:  rgba(0,0,0,0.07);

      --c-saude:    #10b981;
      --c-ia:       #8b5cf6;
      --c-financas: #f59e0b;
      --c-med:      #f97316;
      --c-research: #0ea5e9;
      --c-noticias: #f43f5e;
      --c-rn:       #fb7185;
      --c-puerp:    #c084fc;
      --c-default:  #0ea5e9;

      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Views ──────────────────────────────────────────────────── */
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ── Header ─────────────────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .home-header-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .header-brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--fg);
    }

    .header-date {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 1px;
      background: none;
      border: none;
      color: var(--fg);
      font-size: 17px;
      font-weight: 400;
      cursor: pointer;
      padding: 10px 4px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.01em;
      border-radius: 6px;
    }
    .back-btn:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }
    .back-btn svg { width: 22px; height: 22px; margin-left: -4px; }

    /* ── Home ────────────────────────────────────────────────────── */
    .home-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      padding-bottom: calc(16px + var(--safe-bottom));
    }

    .grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cat-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      aspect-ratio: 0.88;
      transition: transform 0.13s ease, box-shadow 0.13s ease;
      user-select: none;
    }
    .cat-card:active { transform: scale(0.96); box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
    .cat-card:focus-visible { outline: 2px solid var(--fg); outline-offset: 3px; }

    .cat-strip { height: 3px; flex-shrink: 0; }

    .cat-body {
      flex: 1;
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .cat-emoji {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .cat-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--fg);
    }

    .cat-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      background: rgba(0,0,0,0.04);
      padding: 3px 6px;
      border-radius: 5px;
      letter-spacing: 0.03em;
    }

    /* ── Category band ───────────────────────────────────────────── */
    .cat-band {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 12px;
      border-bottom: 3px solid #e2e8f0;
      flex-shrink: 0;
    }
    .band-emoji { font-size: 26px; }
    .band-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fg);
    }
    .band-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Lista ───────────────────────────────────────────────────── */
    .list-scroll { flex: 1; overflow-y: auto; }

    .subcat-list { list-style: none; }

    .subcat-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .subcat-row:active { background: rgba(0,0,0,0.02); }
    .subcat-row:focus-visible {
      outline: none;
      background: rgba(0,0,0,0.03);
      box-shadow: inset 2px 0 0 var(--fg);
    }

    .subcat-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(0,0,0,0.04);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .subcat-info { flex: 1; }
    .subcat-name { font-size: 15px; font-weight: 600; color: var(--fg); margin-bottom: 2px; }
    .subcat-meta { font-size: 12px; color: var(--muted); }
    .subcat-arrow { color: #cbd5e1; flex-shrink: 0; }

    /* ── Digest list ─────────────────────────────────────────────── */
    .digest-list { list-style: none; }

    .digest-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .digest-row:active { background: rgba(0,0,0,0.02); }
    .digest-row:focus-visible {
      outline: none;
      background: rgba(0,0,0,0.03);
      box-shadow: inset 2px 0 0 var(--fg);
    }

    .digest-day {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.05em;
      font-variant-numeric: tabular-nums;
      min-width: 52px;
      flex-shrink: 0;
    }

    .digest-text { flex: 1; }

    .digest-edition {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 3px;
      letter-spacing: -0.01em;
    }
    .digest-edition .new-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(16,185,129,0.12);
      color: #059669;
      margin-left: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      vertical-align: middle;
    }

    .digest-sub { font-size: 13px; color: var(--muted); }
    .digest-arrow { color: #cbd5e1; flex-shrink: 0; }

    /* ── Article ─────────────────────────────────────────────────── */
    .article-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      padding-bottom: calc(48px + var(--safe-bottom));
    }

    .art-day {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -0.055em;
      line-height: 0.88;
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px;
    }

    .art-month { font-size: 15px; color: var(--muted); margin-bottom: 16px; }

    .art-reading {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .art-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 24px;
      color: var(--fg);
    }

    .art-divider { height: 1px; background: #f1f5f9; margin-bottom: 28px; }

    .art-body { font-size: 16px; line-height: 1.75; color: #1e293b; }
    .art-body h1 {
      font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
      line-height: 1.3; color: var(--fg); margin: 0 0 16px;
    }
    .art-body h2 {
      font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--fg); margin: 28px 0 10px;
      padding-bottom: 8px; border-bottom: 1px solid #f1f5f9;
    }
    .art-body h3 { font-size: 15px; font-weight: 600; color: var(--fg); margin: 20px 0 8px; }
    .art-body p  { margin-bottom: 14px; }
    .art-body strong { color: var(--fg); font-weight: 600; }
    .art-body em     { color: var(--muted); }
    .art-body ul, .art-body ol { padding-left: 20px; margin-bottom: 14px; }
    .art-body li { margin-bottom: 5px; }
    .art-body blockquote {
      border-left: 3px solid var(--cat-color, var(--c-default));
      background: #f8fafc;
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      margin: 16px 0;
      color: #334155;
      font-weight: 500;
      font-size: 15px;
      line-height: 1.68;
    }
    .art-body a   { color: var(--cat-color, var(--c-default)); text-decoration: none; }
    .art-body hr  { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }
    .art-body code {
      font-size: 12px; background: #f1f5f9;
      border-radius: 4px; padding: 1px 5px; color: #334155;
    }

    /* ── Estados ─────────────────────────────────────────────────── */
    .state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; text-align: center; padding: 40px 20px;
    }
    .state-icon { font-size: 36px; }
    .state-msg  { font-size: 14px; color: var(--muted); }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(0,0,0,0.08);
      border-top-color: rgba(0,0,0,0.4);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar hide ──────────────────────────────────────────── */
    .home-scroll::-webkit-scrollbar,
    .list-scroll::-webkit-scrollbar,
    .article-scroll::-webkit-scrollbar { display: none; }
    .home-scroll, .list-scroll, .article-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* ── Reduced motion ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .cat-card, .digest-row, .subcat-row { transition: none; }
      :root[data-nav-dir]::view-transition-new(root),
      :root[data-nav-dir]::view-transition-old(root) { animation: none; }
    }

    /* ── View transitions ────────────────────────────────────────── */
    @keyframes vt-in-right  { from { opacity:0; transform:translateX(24px);  } to { opacity:1; transform:none; } }
    @keyframes vt-out-left  { from { opacity:1; transform:none; } to { opacity:0; transform:translateX(-16px); } }
    @keyframes vt-in-left   { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:none; } }
    @keyframes vt-out-right { from { opacity:1; transform:none; } to { opacity:0; transform:translateX(16px);  } }

    :root[data-nav-dir="forward"]::view-transition-new(root)  { animation: vt-in-right  0.25s cubic-bezier(0.25,0.46,0.45,0.94); }
    :root[data-nav-dir="forward"]::view-transition-old(root)  { animation: vt-out-left  0.20s cubic-bezier(0.55,0,1,0.45); }
    :root[data-nav-dir="back"]::view-transition-new(root)     { animation: vt-in-left   0.25s cubic-bezier(0.25,0.46,0.45,0.94); }
    :root[data-nav-dir="back"]::view-transition-old(root)     { animation: vt-out-right 0.20s cubic-bezier(0.55,0,1,0.45); }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ HOME ══════════════════════════════════════════════════ -->
  <div class="view active" id="view-home">
    <header class="app-header">
      <div class="home-header-content">
        <span class="header-brand">Seu resumo de notícias</span>
        <span class="header-date" id="header-today"></span>
      </div>
    </header>
    <div class="home-scroll">
      <div class="grid-2x2" id="cat-grid">
        <div class="state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ══ LIST ══════════════════════════════════════════════════ -->
  <div class="view" id="view-list">
    <header class="app-header">
      <button class="back-btn" id="list-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="list-back-label">Início</span>
      </button>
    </header>
    <div class="cat-band" id="cat-band">
      <div class="band-emoji" id="band-emoji"></div>
      <div>
        <div class="band-name" id="band-name"></div>
        <div class="band-meta" id="band-meta"></div>
      </div>
    </div>
    <div class="list-scroll" id="list-scroll-area">
      <div class="state"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ══ ARTICLE ══════════════════════════════════════════════ -->
  <div class="view" id="view-article">
    <header class="app-header">
      <button class="back-btn" id="art-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="art-back-label"></span>
      </button>
    </header>
    <div class="article-scroll" id="art-content"></div>
  </div>

</div>
<script>
  const REPO = 'cassio-gon/meu-vault';
  const BASE = 'Pesquisas';
  const API  = `https://api.github.com/repos/${REPO}/contents`;
  const RAW  = `https://raw.githubusercontent.com/${REPO}/main`;

  const META = {
    'Saude':                { icon: '🏥', label: 'Saúde',          color: '#10b981' },
    'IA':                   { icon: '🤖', label: 'IA',             color: '#8b5cf6' },
    'Mercado Financeiro':   { icon: '📈', label: 'Finanças',       color: '#f59e0b' },
    'Medicina do Trabalho': { icon: '👷', label: 'Med. Trabalho',  color: '#f97316' },
    'Research':             { icon: '🔬', label: 'Research',       color: '#0ea5e9' },
    'Noticias':             { icon: '📰', label: 'Notícias',       color: '#f43f5e' },
    'Notícias':             { icon: '📰', label: 'Notícias',       color: '#f43f5e' },
    'RN':                   { icon: '👶', label: 'RN',             color: '#fb7185' },
    'Puerperio':            { icon: '🤱', label: 'Puerpério',      color: '#c084fc' },
    'Puerpério':            { icon: '🤱', label: 'Puerpério',      color: '#c084fc' },
    'UTI':                  { icon: '🏨', label: 'UTI',            color: '#f97316' },
    'Cardiologia':          { icon: '❤️',  label: 'Cardiologia',   color: '#ef4444' },
    'Pediatria':            { icon: '🧒', label: 'Pediatria',      color: '#38bdf8' },
  };

  function getMeta(name) {
    return META[name] || { icon: '📁', label: name, color: '#0ea5e9' };
  }

  let navStack = [{ view: 'view-home', data: {} }];

  // ── Transições ────────────────────────────────────────────────
  function showView(id, dir = 'forward') {
    document.documentElement.setAttribute('data-nav-dir', dir);
    const update = () => {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      const scroll = document.querySelector(`#${id} [class*="-scroll"]`);
      if (scroll) scroll.scrollTop = 0;
    };
    if (document.startViewTransition) document.startViewTransition(update);
    else update();
  }

  function navigateTo(viewId, data, dir = 'forward') {
    navStack.push({ view: viewId, data });
    showView(viewId, dir);
  }

  function goBack() {
    if (navStack.length <= 1) return;
    navStack.pop();
    const prev = navStack[navStack.length - 1];
    showView(prev.view, 'back');
    if (prev.view === 'view-list' && prev.data) restoreList(prev.data);
  }

  // ── Fetch ─────────────────────────────────────────────────────
  async function apiFetch(path) {
    const res = await fetch(`${API}/${path}`);
    if (!res.ok) throw new Error(`API ${res.status}`);
    return res.json();
  }

  async function rawFetch(path) {
    const res = await fetch(`${RAW}/${path}`);
    if (!res.ok) throw new Error(`Raw ${res.status}`);
    return res.text();
  }

  // ── Data helpers ──────────────────────────────────────────────
  function extractDate(fname) {
    const m = fname.match(/^(\d{4}-\d{2}-\d{2})/);
    return m ? m[1] : '';
  }

  function parseDate(ds) {
    if (!ds) return null;
    const [, mo, d] = ds.split('-');
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return { day: parseInt(d), month: months[parseInt(mo)-1] };
  }

  function todayStr() {
    const d = new Date();
    const days   = ['dom','seg','ter','qua','qui','sex','sáb'];
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
  }

  function readingMin(md) {
    return Math.max(1, Math.round(md.trim().split(/\s+/).length / 200));
  }

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    document.getElementById('header-today').textContent = todayStr();
    try {
      const items = await apiFetch(BASE);
      const cats  = items.filter(i => i.type === 'dir').map(i => i.name).sort();
      renderHome(cats);
    } catch {
      showStateInEl(document.getElementById('cat-grid'), '⚠️', 'Erro ao carregar categorias.');
    }
  }

  // ── Home ──────────────────────────────────────────────────────
  function renderHome(cats) {
    const grid = document.getElementById('cat-grid');
    if (!cats.length) { showStateInEl(grid, '📭', 'Nenhuma categoria encontrada.'); return; }

    grid.innerHTML = '';
    cats.forEach(cat => {
      const m    = getMeta(cat);
      const card = document.createElement('div');
      card.className = 'cat-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', m.label);
      card.innerHTML = `
        <div class="cat-strip" style="background:${m.color}"></div>
        <div class="cat-body">
          <div class="cat-emoji" aria-hidden="true">${m.icon}</div>
          <div class="cat-name">${m.label}</div>
          <div class="cat-badge" id="badge-${cat}">—</div>
        </div>`;
      card.addEventListener('click', () => selectCategory(cat));
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectCategory(cat); }
      });
      grid.appendChild(card);

      loadLatestDate(cat).then(d => {
        const el = document.getElementById(`badge-${cat}`);
        if (el) el.textContent = d || '—';
      });
    });
  }

  async function loadLatestDate(cat) {
    try {
      const items = await apiFetch(`${BASE}/${encodeURIComponent(cat)}`);
      const mds   = items.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));
      if (mds.length) {
        mds.sort((a, b) => b.name.localeCompare(a.name));
        const p = parseDate(extractDate(mds[0].name));
        return p ? `${p.day} ${p.month}` : null;
      }
      const dirs = items.filter(i => i.type === 'dir');
      if (dirs.length) {
        const sub = await apiFetch(`${BASE}/${encodeURIComponent(cat)}/${encodeURIComponent(dirs[0].name)}`);
        const sf  = sub.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));
        sf.sort((a, b) => b.name.localeCompare(a.name));
        if (sf.length) { const p = parseDate(extractDate(sf[0].name)); return p ? `${p.day} ${p.month}` : null; }
      }
    } catch {}
    return null;
  }

  // ── Categoria ─────────────────────────────────────────────────
  async function selectCategory(cat) {
    const m = getMeta(cat);
    setListHeader(m, 'Início', 'Carregando...');
    showListLoading();
    navigateTo('view-list', { type: 'loading', category: cat });
    document.getElementById('list-back').onclick = () => goBack();

    try {
      const items = await apiFetch(`${BASE}/${encodeURIComponent(cat)}`);
      const dirs  = items.filter(i => i.type === 'dir');
      const mds   = items.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));

      if (dirs.length > 0 && mds.length === 0) {
        const data = { type: 'subcats', category: cat, subcats: dirs.map(d => d.name) };
        navStack[navStack.length - 1].data = data;
        renderSubcats(cat, dirs.map(d => d.name));
      } else {
        const files = mds.sort((a, b) => b.name.localeCompare(a.name)).map(f => ({ name: f.name, path: f.path }));
        const data  = { type: 'digests', category: cat, subcategory: null, files };
        navStack[navStack.length - 1].data = data;
        renderDigestList(cat, null, files);
      }
    } catch {
      showStateInEl(document.getElementById('list-scroll-area'), '⚠️', 'Erro ao carregar categoria.');
    }
  }

  // ── Subcategorias ─────────────────────────────────────────────
  function renderSubcats(cat, subcats) {
    const pm = getMeta(cat);
    setListHeader(pm, 'Início', `${subcats.length} subcategorias`);

    const area = document.getElementById('list-scroll-area');
    const ul   = document.createElement('ul');
    ul.className = 'subcat-list';

    subcats.forEach(sub => {
      const sm = getMeta(sub);
      const li = document.createElement('li');
      li.className = 'subcat-row';
      li.setAttribute('role', 'button');
      li.setAttribute('tabindex', '0');
      li.innerHTML = `
        <div class="subcat-icon-wrap">${sm.icon}</div>
        <div class="subcat-info">
          <div class="subcat-name">${sm.label}</div>
          <div class="subcat-meta" id="smeta-${sub}">carregando...</div>
        </div>
        <svg class="subcat-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
      li.addEventListener('click', () => selectSubcategory(cat, sub));
      li.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectSubcategory(cat, sub); }
      });
      ul.appendChild(li);

      apiFetch(`${BASE}/${encodeURIComponent(cat)}/${encodeURIComponent(sub)}`).then(items => {
        const mds    = items.filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'));
        mds.sort((a, b) => b.name.localeCompare(a.name));
        const latest = mds.length ? parseDate(extractDate(mds[0].name)) : null;
        const latStr = latest ? ` · ${latest.day} ${latest.month}` : '';
        const el     = document.getElementById(`smeta-${sub}`);
        if (el) el.textContent = `${mds.length} digest${mds.length !== 1 ? 's' : ''}${latStr}`;
      }).catch(() => {
        const el = document.getElementById(`smeta-${sub}`);
        if (el) el.textContent = '';
      });
    });

    area.innerHTML = '';
    area.appendChild(ul);
  }

  async function selectSubcategory(cat, sub) {
    const sm = getMeta(sub);
    const pm = getMeta(cat);
    setListHeader(sm, pm.label, 'Carregando...');
    showListLoading();
    document.getElementById('list-back').onclick = () => goBack();

    try {
      const items = await apiFetch(`${BASE}/${encodeURIComponent(cat)}/${encodeURIComponent(sub)}`);
      const files = items
        .filter(i => i.type === 'file' && i.name.endsWith('.md') && !i.name.startsWith('_'))
        .sort((a, b) => b.name.localeCompare(a.name))
        .map(f => ({ name: f.name, path: f.path }));

      const data = { type: 'digests', category: cat, subcategory: sub, files };
      navigateTo('view-list', data);
      document.getElementById('list-back').onclick = () => goBack();
      renderDigestList(cat, sub, files);
    } catch {
      showStateInEl(document.getElementById('list-scroll-area'), '⚠️', 'Erro ao carregar subcategoria.');
    }
  }

  // ── Digest list ───────────────────────────────────────────────
  function renderDigestList(cat, sub, files) {
    const m = getMeta(sub || cat);
    setListHeader(m, sub ? getMeta(cat).label : 'Início', `${files.length} edição${files.length !== 1 ? 'ões' : ''}`);

    if (!files.length) {
      showStateInEl(document.getElementById('list-scroll-area'), '📭', 'Nenhum digest encontrado.');
      return;
    }

    const area = document.getElementById('list-scroll-area');
    const ul   = document.createElement('ul');
    ul.className = 'digest-list';

    files.forEach((file, idx) => {
      const ds   = extractDate(file.name);
      const date = parseDate(ds);
      const li   = document.createElement('li');
      li.className = 'digest-row';
      li.setAttribute('role', 'button');
      li.setAttribute('tabindex', '0');
      li.setAttribute('aria-label', `Digest ${ds}`);
      const newBadge = idx === 0 ? '<span class="new-badge">novo</span>' : '';
      li.innerHTML = `
        <div class="digest-day" style="color:${m.color}" aria-hidden="true">${date ? date.day : '—'}</div>
        <div class="digest-text">
          <div class="digest-edition">${date ? `${date.day} ${date.month}` : ds}${newBadge}</div>
          <div class="digest-sub">Digest · lendo...</div>
        </div>
        <svg class="digest-arrow" aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
      li.addEventListener('click', () => openArticle(file, cat, sub));
      li.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openArticle(file, cat, sub); }
      });
      ul.appendChild(li);
    });

    area.innerHTML = '';
    area.appendChild(ul);
  }

  // ── Artigo ────────────────────────────────────────────────────
  async function openArticle(file, cat, sub) {
    const m    = getMeta(sub || cat);
    const ds   = extractDate(file.name);
    const date = parseDate(ds);

    document.getElementById('art-back-label').textContent = m.label;
    document.getElementById('art-back').onclick = () => goBack();
    document.getElementById('art-content').innerHTML = '<div class="state"><div class="spinner"></div></div>';

    navigateTo('view-article', { file, category: cat, subcategory: sub });

    try {
      const md     = await rawFetch(file.path);
      const html   = marked.parse(md);
      const min    = readingMin(md);
      const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
      const mo     = ds ? months[parseInt(ds.split('-')[1]) - 1] + ' ' + ds.split('-')[0] : '';

      document.getElementById('art-content').innerHTML = `
        <div class="art-day" style="color:${m.color}">${date ? date.day : '—'}</div>
        <div class="art-month">${mo}</div>
        <div class="art-reading">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${min} min de leitura
        </div>
        <div class="art-tag" style="background:${m.color}18">${m.icon} ${m.label}</div>
        <div class="art-divider"></div>
        <div class="art-body" style="--cat-color:${m.color}">${html}</div>`;
    } catch {
      document.getElementById('art-content').innerHTML =
        '<div class="state"><div class="state-icon">⚠️</div><div class="state-msg">Erro ao carregar o artigo.</div></div>';
    }
  }

  // ── Restaurar list ao voltar ──────────────────────────────────
  function restoreList(data) {
    if (!data || data.type === 'loading') return;
    document.getElementById('list-back').onclick = () => goBack();
    if (data.type === 'subcats') renderSubcats(data.category, data.subcats);
    else if (data.type === 'digests') renderDigestList(data.category, data.subcategory, data.files);
  }

  // ── UI helpers ────────────────────────────────────────────────
  function setListHeader(meta, backLabel, metaText) {
    document.getElementById('list-back-label').textContent = backLabel;
    document.getElementById('band-emoji').textContent = meta.icon;
    document.getElementById('band-name').textContent  = meta.label;
    document.getElementById('band-meta').textContent  = metaText;
    const band = document.getElementById('cat-band');
    if (band) band.style.borderBottomColor = meta.color;
  }

  function showListLoading() {
    document.getElementById('list-scroll-area').innerHTML =
      '<div class="state"><div class="spinner"></div></div>';
  }

  function showStateInEl(el, icon, msg) {
    el.innerHTML = `<div class="state"><div class="state-icon">${icon}</div><div class="state-msg">${msg}</div></div>`;
  }

  // ── PWA manifest ──────────────────────────────────────────────
  (() => {
    const m    = { name:'Vault Digest', short_name:'Vault', start_url:'.', display:'standalone', background_color:'#ffffff', theme_color:'#ffffff', icons:[{src:'https://fakeimg.pl/192x192/ffffff/0f172a?text=V&font_size=80',sizes:'192x192',type:'image/png'}] };
    const link = document.createElement('link');
    link.rel   = 'manifest';
    link.href  = URL.createObjectURL(new Blob([JSON.stringify(m)], {type:'application/json'}));
    document.head.appendChild(link);
  })();

  init();
</script>
</body>
</html>
